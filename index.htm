<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLATON GAMES 10</title>

    <link rel="icon" href="favicon.png" type="image/png">

    <meta name="description" content="Найкраща стратегія Tower Defense.">
    <meta name="keywords" content="Гра, Platon Games">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at center, #0f0c29, #302b63, #000000);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
            user-select: none;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 4rem;
            text-transform: uppercase;
            letter-spacing: 12px;
            background: linear-gradient(to right, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0px 0px 30px rgba(255, 0, 255, 0.5);
        }

        .games-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .game-card {
            display: block;
            text-decoration: none;
            position: relative;
            width: 500px;
            height: 500px;
            cursor: crosshair;
            
            /* Картка обрізана до крихти, але об'єкт всередині (фото) масштабується по центру */
            clip-path: polygon(49% 49%, 51% 49%, 51% 51%, 49% 51%);
            background: #000;
        }

        .game-card img {
            width: 500px;
            height: 500px;
            object-fit: contain; /* Картинка повністю поміщається всередину */
            display: block;
        }

        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .game-card:hover .play-overlay {
            opacity: 1;
        }
    </style>
</head>
<body>

    <header class="header">
        <h1>PLATON GAMES 10</h1>
    </header>

    <main class="games-container">
        <a href="https://platon-lab.github.io/Sky-Dodge/" target="_blank" class="game-card">
            <img src="Sky.png" alt="Sky Dodge">
            <div class="play-overlay">
                <span>🚀</span>
            </div>
        </a>
    </main>

</body>
</html>
